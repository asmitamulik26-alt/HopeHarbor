<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shelter Admin Details</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background: linear-gradient(to right,#021b13,#064d36);
}

.container{
    width:650px;
    margin:40px auto;
    background:#dff5ee;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px #021b13;
}

h2{
    background:#064d36;
    color:white;
    padding:10px;
    border-radius:5px;
    text-align:center;
}

.section{
    margin-top:15px;
    padding:10px;
    border:1px solid #064d36;
    border-radius:5px;
    background:#e9fff8;
}

.section h3{
    margin:0 0 10px 0;
    color:#064d36;
}

label{
    font-weight:bold;
}

input,select,textarea{
    width:100%;
    padding:8px;
    margin:6px 0;
    border-radius:5px;
    border:1px solid #064d36;
}

button{
    background:#0b7a56;
    color:white;
    padding:10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    width:100%;
    margin-top:10px;
}

button:hover{
    background:#021b13;
}
</style>
</head>

<body>

<div class="container">

<h2>Shelter Admin Registration</h2>

<div class="section">
<h3>Admin Details</h3>

<label>Full Name</label>
<input type="text" id="name">

<label>Email</label>
<input type="email" id="email">

<label>Phone</label>
<input type="tel" id="phone">

<label>Organization</label>
<input type="text" id="organization">
</div>

<div class="section">
<h3>Shelter Details</h3>

<label>Shelter Name</label>
<input type="text" id="shelterName">

<label>Address</label>
<textarea id="address"></textarea>

<label>City</label>
<input type="text" id="city">

<label>Total Bed Capacity</label>
<input type="number" id="beds">

<label>Facilities</label>
<select id="facilities">
<option>Food</option>
<option>Medical</option>
<option>Child Care</option>
<option>All Facilities</option>
</select>
</div>

<div class="section">
<h3>Verification</h3>

<label>Registration Number</label>
<input type="text" id="regNumber">

<label>Certificate Link (Google Drive / Cloud)</label>
<input type="url" id="certificateLink" placeholder="Paste certificate link here">
</div>

<button onclick="submitShelter()">Submit Shelter Details</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
    apiKey:"AIzaSyDRLJ66Vic8tl9Qm2E4cXNwnsDRysKH4Vw",
    authDomain:"shsms-ba375.firebaseapp.com",
    projectId:"shsms-ba375",
    storageBucket:"shsms-ba375.appspot.com",
    messagingSenderId:"439498208613",
    appId:"1:439498208613:web:09bdc77ee2f6c338269d8c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// UID from localStorage (or guest)
const uid = localStorage.getItem("currentUserUID") || "guest_" + Date.now();

window.submitShelter = async function(){

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const phone = document.getElementById("phone").value;
    const organization = document.getElementById("organization").value;

    const shelterName = document.getElementById("shelterName").value;
    const address = document.getElementById("address").value;
    const city = document.getElementById("city").value;
    const beds = document.getElementById("beds").value;
    const facilities = document.getElementById("facilities").value;

    const regNumber = document.getElementById("regNumber").value;
    const certificateLink = document.getElementById("certificateLink").value;

    try {
        await setDoc(doc(db,"shelterAdmins",uid),{
            name,
            email,
            phone,
            organization,
            shelterName,
            address,
            city,
            beds,
            facilities,
            regNumber,
            certificateLink
        });

        alert("Shelter Admin Details Saved Successfully!\nCertificate Link: " + certificateLink);

        // Clear form
        document.querySelectorAll("input,textarea,select").forEach(el => el.value = "");

    } catch(error) {
        console.error("Error saving details:", error);
        alert("Error saving details. Check console for more info.");
    }
}
</script>

</body>
</html>
