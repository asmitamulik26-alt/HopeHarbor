<!DOCTYPE html>
<html>
<head>

<title>SHSMS</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<!-- Navbar -->

<nav class="bg-blue-600 p-4 text-white flex justify-between">

<h1 class="text-xl font-bold">
SHSMS
</h1>

<a href="login.html"
class="bg-white text-blue-600 px-4 py-2 rounded">
Login
</a>

</nav>


<!-- Hero -->

<section class="text-center py-20">

<h1 class="text-4xl font-bold">
Find Safe Shelter Near You
</h1>

<p class="mt-3 text-gray-600">
Helping homeless people find safe shelters instantly
</p>

<div class="mt-6">

<input id="city"
class="p-3 border rounded"
placeholder="Enter City">

<button
onclick="searchShelter()"
class="bg-blue-600 text-white p-3 rounded">

Search Shelter

</button>

</div>

</section>


<!-- Shelter Cards -->

<section class="max-w-6xl mx-auto grid md:grid-cols-3 gap-6"
id="shelters">

</section>


<!-- Map -->

<div class="max-w-6xl mx-auto mt-10">

<h2 class="text-2xl font-bold text-center mb-4">
Shelter Map
</h2>

<div id="map" class="h-96 rounded shadow"></div>

</div>


<!-- Emergency -->

<button
onclick="emergency()"
class="fixed bottom-6 right-6 bg-red-600 text-white px-6 py-3 rounded-full shadow-lg">

🚨 SOS

</button>


<script src="shelter.js"></script>

<script src="map.js"></script>

<script
src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap"
async>

</script>

</body>
</html>
