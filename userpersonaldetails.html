<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<title>User Personal Details</title>

<style>

body{
font-family: Arial;
margin:0;
background: linear-gradient(to right,#021b13,#064d36);
}

.container{
width:650px;
margin:40px auto;
background:#dff5ee;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px #021b13;
}

h2{
background:#064d36;
color:white;
padding:10px;
border-radius:5px;
text-align:center;
}

.section{
margin-top:15px;
padding:10px;
border:1px solid #064d36;
border-radius:5px;
background:#e9fff8;
}

label{
font-weight:bold;
}

input, select, textarea{
width:100%;
padding:8px;
margin:6px 0;
border-radius:5px;
border:1px solid #064d36;
}

button{
background:#0b7a56;
color:white;
padding:10px;
border:none;
border-radius:5px;
cursor:pointer;
width:100%;
margin-top:10px;
}

button:hover{
background:#021b13;
}

</style>

</head>

<body>

<div class="container">

<h2>User Personal Details Form</h2>

<div class="section">

<h3>Basic Information</h3>

<label>Full Name</label> <input type="text" id="name">

<label>Date of Birth</label> <input type="date" id="dob">

<label>Phone Number</label> <input type="tel" id="phone">

<label>Address</label>

<textarea id="address"></textarea>

<label>City</label> <input type="text" id="city">

<label>Pincode</label> <input type="number" id="pincode">

</div>

<div class="section">

<h3>Document Verification</h3>

<label>Document Type</label> <select id="docType">

<option>PAN Card</option>
<option>Aadhaar Card</option>
<option>Ration Card</option>
<option>Voter Card</option>
</select>

<label>Document Number</label> <input type="text" id="docNumber">

<label>Document Link (Google Drive PDF)</label> <input type="text" id="documentLink" placeholder="Paste Google Drive link">

</div>

<div class="section">

<h3>Additional Information</h3>

<label>Occupation</label> <input type="text" id="occupation">

<label>Health Condition</label>

<textarea id="health"></textarea>

<label>Additional Notes</label>

<textarea id="notes"></textarea>

</div>

<button onclick="submitForm()">Submit Details</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDRLJ66Vic8tl9Qm2E4cXNwnsDRysKH4Vw",
authDomain: "shsms-ba375.firebaseapp.com",
projectId: "shsms-ba375",
storageBucket: "shsms-ba375.appspot.com",
messagingSenderId: "439498208613",
appId: "1:439498208613:web:09bdc77ee2f6c338269d8c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const uid = localStorage.getItem("currentUserUID");


window.submitForm = async function(){

alert("Submit button working");

const name = document.getElementById("name").value;
const dob = document.getElementById("dob").value;
const phone = document.getElementById("phone").value;
const address = document.getElementById("address").value;
const city = document.getElementById("city").value;
const pincode = document.getElementById("pincode").value;

const docType = document.getElementById("docType").value;
const docNumber = document.getElementById("docNumber").value;
const documentLink = document.getElementById("documentLink").value;

const occupation = document.getElementById("occupation").value;
const health = document.getElementById("health").value;
const notes = document.getElementById("notes").value;

try{

await setDoc(doc(db,"userDetails",uid),{

name,
dob,
phone,
address,
city,
pincode,
docType,
docNumber,
documentLink,
occupation,
health,
notes

});

alert("Details Saved Successfully!");

window.location.href = "allocation.html";

}catch(error){

alert("Error: "+error.message);

}

}

</script>

</body>
</html>
